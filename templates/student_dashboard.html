<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="container card wide">
        <h2>Attendance Dashboard</h2>
        <p><strong>Roll Number:</strong> {{ roll }}</p>
        <p>Read-only attendance records from shared Excel file.</p>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% if records %}
                    {% for row in records %}
                    <tr>
                        <td>{{ row.date }}</td>
                        <td>{{ row.time }}</td>
                        <td>{{ row.status }}</td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr><td colspan="3">No attendance records found.</td></tr>
                {% endif %}
            </tbody>
        </table>
        <a class="btn btn-danger" href="{{ url_for('logout') }}">Logout</a>
    </div>
</body>
</html>
