<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Camera Console</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="container card wide">
        <h2>Admin Camera Console</h2>
        <p>After login, webcam activates. Click mark attendance to detect and recognize student face.</p>
        <video id="video" autoplay playsinline></video>
        <div class="button-group">
            <button class="btn" id="startCameraBtn">Start Camera</button>
            <button class="btn btn-secondary" id="captureBtn">Mark Attendance</button>
            <a class="btn btn-danger" href="{{ url_for('logout') }}">Logout</a>
        </div>
        <p id="statusText"></p>
    </div>
    <script src="{{ url_for('static', filename='admin_camera.js') }}"></script>
</body>
</html>
